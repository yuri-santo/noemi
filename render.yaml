services:
  - type: web
    name: noemi-1-aninho
    env: static
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    buildCommand: null
    pullRequestPreviewsEnabled: false
